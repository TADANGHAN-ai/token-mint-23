name: Mint Token
on:
  workflow_dispatch:
    inputs:
      batch:
        description: 'JSON array of owner/repo to ingest: [["owner","repo"],...]'
        required: false
        default: '[]'
        type: string
      purpose:
        description: 'What this run is for'
        required: false
        default: 'harvest'

jobs:
  mint:
    runs-on: ubuntu-latest
    steps:
      - name: Print batch
        run: |
          echo "Batch received:"
          echo '${{ inputs.batch }}'
      - name: Echo token
        run: |
          echo "::set-output name=token::${{ secrets.GITHUB_TOKEN }}"
          echo "GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }}" >> $GITHUB_OUTPUT