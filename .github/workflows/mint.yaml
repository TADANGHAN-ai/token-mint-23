name: Mint Token
on:
  workflow_dispatch:
    inputs:
      batch:
        description: 'JSON array of owner/repo pairs'
        required: false
        default: '[]'
        type: string
      purpose:
        description: 'Purpose'
        required: false
        default: 'harvest'
        type: string

jobs:
  mint:
    runs-on: ubuntu-latest
    steps:
      - name: Print inputs
        run: |
          echo "Inputs received"
          echo "batch=${{ inputs.batch }}"
          echo "purpose=${{ inputs.purpose }}"
